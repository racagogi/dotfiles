[bar/main]
background               = ${color.background}
foreground               = ${color.foreground}
font-0                   = JetBrainsMono NFM:style=Regular:size=13;5
font-1                   = JetBrainsMono NFM:style=Regular:size=23;5
font-2                   = KoPubBatang_pro:size=16;5
font-3                   = KoPubBatang_pro:size=18;5
font-4                   = Noto Naskh Arabic UI:size=18;5
height                   = 35
padding                  = 1
module-margin            = 1
locale                   = ko_KR.UTF-8
pseudo-transparency      = true
fixed-center             = true
line-size                = 3
modules-left             = ewmh
modules-center           = date
modules-right            = working resting battery

[module/date]
type                     = internal/date
interval                 = 1.0
time                     = %H:%M
time-alt                 = %x %A %H:%M
format                   = <label>
format-font              = 3
label                    = %time%

[module/ewmh]
type                     = internal/xworkspaces
enable-click             = true
enable-scroll            = true
reverse-scroll           = true
format                   = <label-state>
format-font              = 5
label-active             = %name%
label-active-underline   = ${color.color4}
label-active-padding     = 1
label-occupied           = %name%
label-occupied-underline = ${color.color5}
label-occupied-padding   = 1
label-urgent             = %name%
label-urgent-underline   = ${color.color17}
label-urgent-padding     = 1
label-empty              = %name%
label-empty-underline    = ${color.color6}
label-empty-padding      = 1

[module/battery]
type = internal/battery
full-at = 99
low-at = 15
battery = BAT0
adapter = ACAD
poll-interval = 5
format-charging = ﮣ <animation-charging> <label-charging>
format-discharging = ﮤ <animation-discharging> <label-discharging>
label-charging = %percentage%%
label-discharging = %percentage%%
animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
animation-charging-5 = 
animation-charging-6 = 
animation-charging-7 = 
animation-charging-8 = 
animation-charging-9 = 
animation-charging-framerate = 750
animation-discharging-9 = 
animation-discharging-8 = 
animation-discharging-7 = 
animation-discharging-6 = 
animation-discharging-5 = 
animation-discharging-4 = 
animation-discharging-3 = 
animation-discharging-2 = 
animation-discharging-1 = 
animation-discharging-0 = 
animation-discharging-framerate = 500







