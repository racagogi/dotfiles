[bar/main]
background = ${color.background}
foreground = ${color.foreground}
font-0=JetBrainsMono Nerd Font Mono:style=Regular:size=13;5
font-1=JetBrainsMono Nerd Font Mono:style=Regular:size=23;5
font-2=KoPubBatang_pro:size=16;5
font-3=KoPubBatang_pro:size=18;5
font-4=Noto Naskh Arabic UI:size=18;5
height = 35
padding=1
module-margin = 1
locale = ko_KR.UTF-8
pseudo-transparency = true
fixed-center = true
line-size = 3
modules-left = ewmh
modules-center = date
modules-right = audio backlight wired cpu memory battery

[module/cpu]
type = internal/cpu
interval = 0.5
format = <label>
format-prefix= ’ŗø
format-prefix-font =2
label = " %percentage%%"

[module/memory]
type = internal/memory
interval = 3
format = <label>
format-prefix= ’ĪÜ
format-prefix-font =2
label = " %percentage_used%%"

[module/wired]
type = internal/network
interface = eno1
interval = 1.0
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected-font =2
label-connected-font =2
label-disconnected = ’Āś
label-connected = ’ĀŚ


[module/date]
type = internal/date
interval = 1.0
time = %H:%M
time-alt = %x %A %H:%M
format = <label>
format-font = 3
label = %time%

[module/backlight]
type = internal/backlight
card = amdgpu_bl1
use-actual-brightness = true
enable-scroll = true
format = <ramp>
ramp-font = 2
ramp-0 = ’ŚØ
ramp-1 = ’Ś×
ramp-2 = ’Ś£
ramp-3 = ’Ś¤

[module/ewmh]
type = internal/xworkspaces
enable-click = true
enable-scroll = true
reverse-scroll = true
format = <label-state>
format-font = 5
label-active = %name%
label-active-underline = ${color.color4}
label-active-padding = 1
label-occupied = %name%
label-occupied-underline = ${color.color5}
label-occupied-padding = 1
label-urgent = %name%
label-urgent-underline = ${color.color17}
label-urgent-padding = 1
label-empty = %name%
label-empty-underline = ${color.color6}
label-empty-padding = 1

[module/audio]
type = internal/pulseaudio
sink = alsa_output.pci-0000_12_00.3.analog-stereo
use-ui-max = true
interval = 1
format-volume = <ramp-volume>
ramp-volume-font = 2
label-muted-font = 2
label-muted = ’▒Ø
ramp-volume-0 = ’Ć”
ramp-volume-1 = ’Ć¦
ramp-volume-2 = ’®Į
click-right = pavucontrol

[module/battery]
type = internal/battery
full-at = 99
low-at = 5
battery = BAT0
adapter = ACAD
poll-interval = 1
format-charging = dd<ramp-capacity>
format-discharging = !<ramp-capacity>
label-full = ’ĢĖ
label-low = ’¢Ź
ramp-capacity-0 = ’Ģ╣
ramp-capacity-1 = ’Ģ║
ramp-capacity-2 = ’Ģ╗
ramp-capacity-3 = ’Ģ╝
ramp-capacity-4 = ’ĢĮ
ramp-capacity-5 = ’ĢĮ
ramp-capacity-6 = ’ĢŠ
ramp-capacity-7 = ’Ģ┐
ramp-capacity-8 = ’¢Ć

[color]
background = #B224283b
foreground = #c0caf5
selection_background = #364A82
selection_foreground = #c0caf5
url_color = #73daca
cursor = #c0caf5
active_tab_background = #7aa2f7
active_tab_foreground = #1f2335
inactive_tab_background = #292e42
inactive_tab_foreground = #545c7e
tab_bar_background = #1D202F
color0 = #1D202F
color1 = #f7768e
color2 = #9ece6a
color3 = #e0af68
color4 = #7aa2f7
color5 = #bb9af7
color6 = #7dcfff
color7 = #a9b1d6
color8 = #414868
color9 = #f7768e
color10 = #9ece6a
color11 = #e0af68
color12 = #7aa2f7
color13 = #bb9af7
color14 = #7dcfff
color15 = #c0caf5
color16 = #ff9e64
color17 = #db4b4b
